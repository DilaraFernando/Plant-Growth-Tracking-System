<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Growth-Agri | Expert Consultation</title>
    <link rel="stylesheet" href="../style/Chat.css">
</head>
<body>


<div class="chat-card">
    <header class="chat-header">
        <div class="expert-avatar">SW</div>
        <div class="expert-info">
            <h4>Shashi Waduge</h4>
            <p>Soil Scientists / Agronomists</p>
        </div>
    </header>

    <div id="waiting-overlay">
        <div class="waiting-card">
            <div class="spinner"></div>
            <h4>Connecting to Expert...</h4>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Waiting for Miss. Shashi Waduge to accept.</p>
        </div>
    </div>

    <div class="chat-messages" id="chat-box">
        <div class="msg bot">Hello! I am Shashi Waduge. Please wait a moment until I review your request.</div>
        <div id="typing-indicator" class="typing">Shashi Waduge is typing...</div>
    </div>

    <footer class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Waiting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </footer>
</div>
<script src="../js/Chat.js"></script>

</body>
</html>
