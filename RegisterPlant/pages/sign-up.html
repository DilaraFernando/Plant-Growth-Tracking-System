<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up - Growth-Agri</title>
    <script src="../../API/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) {
            window.location.href = "../../sing-in/pages/sign-in.html";
        }
    </script>
    <link rel="stylesheet" href="../css/sing-up.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="card">
    <div class="logo-row">
        <div class="logo">🌱</div>
        <div class="brand-name">Growth-Agri</div>
    </div>
    <h1>Add Your Plant</h1>
    <p class="subtitle">
        Welcome! Please fill in the information to continue.
    </p>
    <div class="form-group">
        <label for="plantName">PlantName</label>
        <input
                type="text"
                id="plantName"
                placeholder="Enter your plant's name"
                autocomplete="plantName"
                required
        >
    </div>
    <div class="form-group">
        <label for="plantCategory">Plant Category</label>
        <input
                type="text"
                id="plantCategory"
                placeholder="Choose your plant Category"
                autocomplete="category"
                required
        >
    </div>
    <div class="form-group">
        <label for="plantingDate">Planting Date</label>
        <input
                type="date"
                id="plantingDate"
                placeholder="••••••••"
                autocomplete="new-password"
                required
        >
    </div>
    <button class="btn-signup">Add Plant</button>
    <div class="divider">or sign up with</div>
    <div class="social-row">
        <div class="social-circle"><i class="fab fa-google"></i></div>
        <div class="social-circle"><i class="fab fa-apple"></i></div>
        <div class="social-circle"><i class="fab fa-microsoft"></i></div>
    </div>
    <div class="footer">
        Already have an account? <a href="../../sing-in/pages/sign-in.html">Sign in</a>
    </div>
</div>
</body>
</html>
