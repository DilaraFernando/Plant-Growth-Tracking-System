<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up - Growth-Agri</title>
    <link rel="stylesheet" href="../css/sing-up.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="card">

    <div class="logo-row">
        <div class="logo">🌱</div>
        <div class="brand-name">Growth-Agri</div>
    </div>

    <h1>Create Account</h1>
    <p class="subtitle">
        Welcome! Please fill in the information to continue.
    </p>

    <div class="form-group">
        <label for="username">Username</label>
        <input
                type="text"
                id="username"
                placeholder="Enter your Username"
                autocomplete="name"
                required
        >
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
                required
        >
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input
                type="password"
                id="password"
                placeholder="••••••••"
                autocomplete="new-password"
                required
        >
    </div>

    <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input
                type="password"
                id="confirm-password"
                placeholder="••••••••"
                autocomplete="new-password"
                required
        >
    </div>

    <button class="btn-signup">Create Account</button>

    <div class="divider">or sign up with</div>

    <div class="social-row">
        <div class="social-circle"><i class="fab fa-google"></i></div>
        <div class="social-circle"><i class="fab fa-apple"></i></div>
        <div class="social-circle"><i class="fab fa-microsoft"></i></div>
    </div>

    <div class="footer">
        Already have an account? <a href="../../sing-in/pages/sign-in.html">Sign in</a>
    </div>

</div>

</body>
</html>
