<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Details - Growth Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #059669;
            --primary-light: #ecfdf5;
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-main);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            background: linear-gradient(135deg, #f8fafc 60%, #e0f7fa 100%);
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(160deg, #e0f7fa 0%, #fff 100%);
            border-right: 1.5px solid var(--glass-border);
            box-shadow: 0 2px 16px 0 rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar .logo {
            font-weight: 800;
            font-size: 1.7rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 36px 32px 28px 32px;
            text-decoration: none;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #ecfdf5 60%, #fff 100%);
            border-bottom: 1.5px solid var(--glass-border);
            box-shadow: 0 2px 8px 0 rgba(5,150,105,0.03);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 18px 10px 0 10px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 20px 13px 22px;
            border-radius: 14px;
            color: var(--text-dim);
            font-size: 1.08rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s, color 0.15s, border-left 0.18s;
            border-left: 4px solid transparent;
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .sidebar-link:hover {
            background: #f1f5f9;
            color: var(--primary);
            border-left: 4px solid var(--primary-light);
        }

        .sidebar-link .lucide {
            width: 22px;
            height: 22px;
        }

        .sidebar-footer {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
        }

        .main-content {
            flex: 1;
            padding: 40px 0 0 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 8px 32px 0 rgba(5,150,105,0.06);
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px 40px 40px;
        }

        .detail-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            margin-bottom: 32px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1.5px solid var(--bg-color);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .plant-title h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .plant-meta {
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            gap: 24px;
        }

        .plant-meta i { vertical-align: middle; margin-right: 6px; }

        .status-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge.active { background: var(--primary-light); color: var(--primary); }
        .status-badge.completed { background: #f1f5f9; color: var(--text-dim); }

        .status-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .status-box {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            border: 1.5px solid var(--glass-border);
        }

        .status-box .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .status-box .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        .progress-wide {
            padding: 10px 0;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .progress-bar-bg {
            height: 14px;
            background: #f1f5f9;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #10b981);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .timeline-section h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .timeline {
            position: relative;
            padding-left: 32px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary-light);
            border-radius: 10px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -37px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
            z-index: 1;
        }

        .timeline-content {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: var(--card-shadow);
            transition: all 0.2s;
        }

        .timeline-content:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .timeline-day {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .timeline-stage {
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .health-card {
            background: #fff;
            border: 1.5px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .health-card h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }

        .health-core {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px 0;
        }

        .indicator-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .indicator-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .indicator-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .indicator-value { font-size: 1rem; font-weight: 800; color: var(--text-main); }

        .plant-illustration {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .metrics-card {
            background: var(--primary);
            color: #fff;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .metrics-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .metrics-header h3 { font-size: 1.1rem; font-weight: 700; opacity: 0.9; }

        .metrics-value { font-size: 2.4rem; font-weight: 800; margin-bottom: 10px; }
        .metrics-desc { font-size: 0.9rem; font-weight: 500; opacity: 0.8; line-height: 1.5; }

        .condition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .condition-item {
            background: var(--card-bg);
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .condition-item i { color: var(--primary); margin-bottom: 10px; display: block; }
        .condition-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .condition-value { font-size: 1.2rem; font-weight: 800; color: var(--text-main); }

        @media (max-width: 600px) {
            .container { padding: 0 20px 20px 20px; }
            .status-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="logo">
                <i class="lucide lucide-leaf"></i>
                Growth-Agri
            </a>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link" id="sidebar-dashboard"><i class="lucide lucide-layout-dashboard"></i> Dashboard</a>
                <a href="register-plant.html" class="sidebar-link" id="sidebar-register"><i class="lucide lucide-plus-square"></i> Register Plant</a>
                <a href="greenhouse.html" class="sidebar-link" id="sidebar-greenhouse"><i class="lucide lucide-container"></i> My Greenhouse</a>
                <a href="social-posts.html" class="sidebar-link" id="sidebar-social"><i class="lucide lucide-message-square"></i> Social Posts</a>
                <a href="notifications.html" class="sidebar-link" id="sidebar-notifications"><i class="lucide lucide-bell"></i> Notifications</a>
                <a href="weather.html" class="sidebar-link" id="sidebar-weather"><i class="lucide lucide-cloud-sun"></i> Weather</a>
                <a href="experts.html" class="sidebar-link" id="sidebar-experts"><i class="lucide lucide-users"></i> Expert Advice</a>
                <a href="locator.html" class="sidebar-link" id="sidebar-locator"><i class="lucide lucide-map-pin"></i> Plant Locator</a>
                <a href="#" class="sidebar-link" id="sidebar-logout" onclick="auth.logout()" style="margin-top:auto;"><i class="lucide lucide-log-out"></i> Logout</a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>
        <main class="main-content">
            <div class="container">
                <div id="plant-detail-container">
                    <div class="loading">Loading details...</div>
                </div>
                <div class="timeline-section">
                    <h2>Growth Timeline</h2>
                    <div id="timeline-container">
                        <div class="loading">Loading growth logs...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="API/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) {
            window.location.href = "sing-in/pages/sign-in.html";
        }

        const urlParams = new URLSearchParams(window.location.search);
        const plantId = urlParams.get('id');

        if (!plantId) {
            window.location.href = 'dashboard.html';
        }

        async function fetchPlantDetails() {
            try {
                // Fetch all plants and find the one with the matching ID
                const response = await fetch('http://localhost:8080/api/v1/plants', {
                    headers: auth.authHeaders()
                });
                const json = await response.json();
                const plants = json.data;
                const plant = plants.find(p => p.id == plantId);

                if (!plant) throw new Error('Plant not found');

                renderPlantDetail(plant);
                fetchLogs();
            } catch (err) {
                document.getElementById('plant-detail-container').innerHTML = `<div class="error">${err.message}</div>`;
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch(`http://localhost:8080/api/v1/plants/${plantId}/logs`, {
                    headers: auth.authHeaders()
                });
                const json = await response.json();
                const logs = json.data;
                renderLogs(logs);
            } catch (err) {
                document.getElementById('timeline-container').innerHTML = `<div class="error">Failed to load logs</div>`;
            }
        }

        function renderPlantDetail(plant) {
            const container = document.getElementById('plant-detail-container');
            const progress = Math.min((plant.currentDay / 30) * 100, 100);
            const plantedDate = plant.plantedDate ? new Date(plant.plantedDate).toLocaleDateString() : 'N/A';

            container.innerHTML = `
                <div class="detail-card">
                    <div class="detail-header">
                        <div class="plant-title">
                            <h1>${plant.plantName}</h1>
                            <div class="plant-meta">
                                <span><i data-lucide="leaf" style="width:16px;height:16px;vertical-align:middle;"></i> ${plant.plantType}</span>
                                <span><i data-lucide="calendar" style="width:16px;height:16px;vertical-align:middle;"></i> Planted on ${plantedDate}</span>
                            </div>
                        </div>
                        <span class="status-badge ${plant.status.toLowerCase()}">${plant.status}</span>
                    </div>

                    <div class="status-section">
                        <div class="status-box">
                            <span class="label">Current Day</span>
                            <span class="value">${plant.currentDay}</span>
                        </div>
                        <div class="status-box">
                            <span class="label">Current Stage</span>
                            <span class="value">${plant.currentStage || 'Unknown'}</span>
                        </div>
                    </div>

                    <div class="progress-wide">
                        <div class="progress-labels">
                            <span>Growth Progress</span>
                            <span>${Math.round(progress)}%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>

                <div class="analysis-grid">
                    <div class="health-card">
                        <h3>Visual Health Analysis</h3>
                        <div class="health-core">
                            <div class="indicator-item">
                                <div class="indicator-icon"><i data-lucide="leaf"></i></div>
                                <span class="indicator-label">Leaves</span>
                                <span class="indicator-value">Healthy</span>
                            </div>
                            <img src="images/c432b3faa4249ea7cabd7392c83d611b-removebg-preview.png" class="plant-illustration" alt="Plant">
                            <div class="indicator-item">
                                <div class="indicator-icon"><i data-lucide="ruler"></i></div>
                                <span class="indicator-label">Stem</span>
                                <span class="indicator-value">${(10 + plant.currentDay * 0.5).toFixed(1)} cm</span>
                            </div>
                        </div>
                        <div style="display:flex; justify-content: space-around; border-top: 1.5px solid var(--bg-color); padding-top: 20px;">
                            <div style="text-align:center;"><b style="font-size:1.2rem; display:block;">${Math.floor(5 + plant.currentDay * 0.8)}</b><small style="color:var(--text-dim); font-weight:700; text-transform:uppercase; font-size:0.75rem;">Total Leaves</small></div>
                            <div style="text-align:center;"><b style="font-size:1.2rem; display:block; color:var(--primary);">98%</b><small style="color:var(--text-dim); font-weight:700; text-transform:uppercase; font-size:0.75rem;">Health Score</small></div>
                        </div>
                    </div>
                    <div class="metrics-card">
                        <div class="metrics-header">
                            <h3>Daily Growth</h3>
                            <i data-lucide="trending-up"></i>
                        </div>
                        <div>
                            <div class="metrics-value">+${(Math.random() * 0.5 + 0.5).toFixed(1)}<small style="font-size:1rem; font-weight:600; margin-left:4px;">cm</small></div>
                            <p class="metrics-desc">Your plant grew significantly today. Keep up the consistent watering schedule!</p>
                        </div>
                        <div style="background:rgba(255,255,255,0.2); height:60px; border-radius:12px; margin-top:16px; border:1px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:600;">Chart Visualization</div>
                    </div>
                </div>

                <div class="condition-grid">
                    <div class="condition-item">
                        <i data-lucide="droplets"></i>
                        <span class="condition-label">Moisture</span>
                        <span class="condition-value">45%</span>
                    </div>
                    <div class="condition-item">
                        <i data-lucide="test-tube"></i>
                        <span class="condition-label">pH Level</span>
                        <span class="condition-value">6.4</span>
                    </div>
                    <div class="condition-item">
                        <i data-lucide="thermometer"></i>
                        <span class="condition-label">Temp</span>
                        <span class="condition-value">22°C</span>
                    </div>
                    <div class="condition-item">
                        <i data-lucide="wind"></i>
                        <span class="condition-label">Humidity</span>
                        <span class="condition-value">55%</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderLogs(logs) {
            const container = document.getElementById('timeline-container');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="error">No logs available for this plant yet.</div>';
                return;
            }

            // Sort logs by day descending
            logs.sort((a, b) => b.dayNumber - a.dayNumber);

            let html = '<div class="timeline">';
            logs.forEach(log => {
                const logDate = new Date(log.date).toLocaleDateString(undefined, { 
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                html += `
                    <div class="timeline-item">
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <span class="timeline-day">Day ${log.dayNumber}</span>
                                <span class="timeline-date">${logDate}</span>
                            </div>
                            <div class="timeline-stage">${log.stageName}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            auth.hideAuthLinks();
            fetchPlantDetails();
        });
    </script>
</body>
</html>
