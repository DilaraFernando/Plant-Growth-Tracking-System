<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Analytics | PlantPulse</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #059669;
            --primary-light: #e0f7ef;
            --primary-glow: rgba(5, 150, 105, 0.15);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --accent-blue: #2563eb;
            --glass-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 8px 32px 0 rgba(60, 180, 120, 0.10), 0 1.5px 4px -2px rgb(0 0 0 / 0.05);
            --border-radius: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.03) 0%, transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* --- Sidebar --- */
        aside {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1.5px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center; gap: 0.75rem; font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 3rem; text-decoration: none;
        }

        nav { flex: 1; }
        nav ul { list-style: none; }
        nav li { margin-bottom: 0.5rem; }

        .nav-link {
            display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; color: var(--text-dim); text-decoration: none; border-radius: 12px; transition: all 0.2s ease; font-weight: 600;
        }

        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary-light); color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary-glow); }

        /* --- Main Content --- */
        main { flex: 1; padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }

        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header-title h1 { font-size: 2.2rem; font-weight: 800; color: var(--text-main); letter-spacing: -1.5px; }
        .header-title p { color: var(--text-dim); font-size: 1.1rem; margin-top: 4px; font-weight: 600; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-bottom: 32px; }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 40px 48px;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            margin-top: 48px;
            margin-bottom: 48px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, var(--primary-light) 0%, transparent 100%);
            border-radius: 50%;
            z-index: 0;
        }
        .plant-details {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .plant-detail-row {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 1.18rem;
            font-weight: 500;
            color: var(--text-main);
            background: rgba(236, 253, 245, 0.7);
            border-radius: 18px;
            padding: 16px 22px;
            box-shadow: 0 2px 8px 0 rgba(5, 150, 105, 0.04);
            border: 1px solid var(--primary-light);
        }
        .plant-detail-label {
            min-width: 140px;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.08rem;
            letter-spacing: 0.02em;
        }
        .plant-detail-value {
            flex: 1;
            color: var(--text-main);
            font-weight: 600;
        }
        .plant-title {
            font-size: 2.1rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 18px;
            letter-spacing: -1px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .card { padding: 24px 8px; }
            .plant-details { gap: 16px; }
            .plant-detail-row { font-size: 1rem; padding: 10px 8px; }
            .plant-title { font-size: 1.3rem; }
        }

        .card h3 { font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 24px; letter-spacing: -0.5px; }

        .health-hero { grid-column: span 2; display: flex; gap: 32px; align-items: center; }
        .health-img { width: 240px; height: 240px; border-radius: 40px; object-fit: cover; border: 4px solid #fff; box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }

        .metric-badge { padding: 8px 16px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; }
        .badge-safe { background: var(--primary-light); color: var(--primary); }

        .stat-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-card { background: #f8fafc; border-radius: 20px; padding: 20px; border: 1.5px solid var(--glass-border); text-align: center; }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text-main); }

        .span-2 { grid-column: span 2; }
        .large-chart { height: 350px; background: #fff; border-radius: 24px; border: 1.5px solid var(--glass-border); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Growth Timeline */
        .timeline-item { position: relative; padding-left: 32px; margin-bottom: 24px; }
        .timeline-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 2px; background: var(--glass-border); }
        .timeline-dot { position: absolute; left: -6px; top: 6px; width: 14px; height: 14px; background: var(--primary); border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 0 0 4px var(--primary-light); }
        .timeline-date { font-weight: 800; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
            .health-hero, .span-2 { grid-column: span 1; }
            .health-hero { flex-direction: column; text-align: center; }
            aside { width: 80px; padding: 2rem 1rem; }
            .nav-link span, .logo span { display: none; }
        }
    </style>
</head>
<body>

    <aside>
        <a href="index.html" class="logo">
            <i data-lucide="sprout"></i>
            <span>PlantPulse</span>
        </a>
        <nav>
            <ul>
                <li><a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
                <li><a href="register-plant.html" class="nav-link"><i data-lucide="plus-square"></i> <span>Register Plant</span></a></li>
                <li><a href="greenhouse.html" class="nav-link"><i data-lucide="container"></i> <span>My Collection</span></a></li>
                <li><a href="social-posts.html" class="nav-link"><i data-lucide="message-square"></i> <span>Social Feed</span></a></li>
                <li><a href="notifications.html" class="nav-link"><i data-lucide="bell"></i> <span>Notifications</span></a></li>
                <li><a href="weather.html" class="nav-link"><i data-lucide="cloud-sun"></i> <span>Weather</span></a></li>
                <li><a href="experts.html" class="nav-link"><i data-lucide="users"></i> <span>Expert Corner</span></a></li>
            </ul>
        </nav>
        <div id="sidebar-plants-section" style="margin-top: 2.5rem;">
            <div style="font-weight:700; color:var(--primary); margin-bottom: 0.5rem; font-size:1.08rem; letter-spacing:0.01em;">All Plants</div>
            <ul id="sidebar-plants-list" style="list-style:none; padding-left:0; margin:0; display:flex; flex-direction:column; gap:0.25rem;"></ul>
        </div>
        <a href="javascript:void(0)" onclick="auth.logout()" style="color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; font-weight: 600; margin-top: auto; padding: 1rem;"><i data-lucide="log-out"></i> <span>Logout</span></a>
    </aside>

    <main id="main-content">
        <div class="card">
            <div class="plant-title" id="detail-plantName-title">Plant Details</div>
            <div class="plant-details">
                <div class="plant-detail-row"><span class="plant-detail-label">Plant Name:</span> <span class="plant-detail-value" id="detail-plantName">-</span></div>
                <div class="plant-detail-row"><span class="plant-detail-label">Plant Type:</span> <span class="plant-detail-value" id="detail-plantType">-</span></div>
                <div class="plant-detail-row"><span class="plant-detail-label">Planted Date:</span> <span class="plant-detail-value" id="detail-plantedDate">-</span></div>
                <div class="plant-detail-row"><span class="plant-detail-label">Current Day:</span> <span class="plant-detail-value" id="detail-currentDay">-</span></div>
                <div class="plant-detail-row"><span class="plant-detail-label">Current Stage:</span> <span class="plant-detail-value" id="detail-currentStage">-</span></div>
                <div class="plant-detail-row"><span class="plant-detail-label">Status:</span> <span class="plant-detail-value" id="detail-status">-</span></div>
            </div>
        </div>
    </main>

    <script src="API/auth.js"></script>
    <script>
        lucide.createIcons();
        if (!auth.isLoggedIn()) { window.location.href = "sing-in/pages/sign-in.html"; }

        // Fetch Individual Plant Data
        const urlParams = new URLSearchParams(window.location.search);
        const plantId = urlParams.get('id');

        async function fetchDetail() {
            if(!plantId) return;
            try {
                const response = await fetch(`http://localhost:8080/api/v1/plants/${plantId}`, {
                    headers: auth.authHeaders()
                });
                const json = await response.json();
                const plant = json.data;
                if(plant) {
                    document.getElementById('detail-plantName-title').innerText = plant.plantName ? plant.plantName : 'Plant Details';
                    document.getElementById('detail-plantName').innerText = plant.plantName || '-';
                    document.getElementById('detail-plantType').innerText = plant.plantType || '-';
                    document.getElementById('detail-plantedDate').innerText = plant.plantedDate || '-';
                    document.getElementById('detail-currentDay').innerText = plant.currentDay != null ? plant.currentDay : '-';
                    document.getElementById('detail-currentStage').innerText = plant.currentStage || '-';
                    document.getElementById('detail-status').innerText = plant.status || '-';
                }
            } catch (err) {
                console.error(err);
            }
        }
        fetchDetail();

        // Fetch all user's plants for sidebar
        async function fetchSidebarPlants() {
            try {
                const response = await fetch('http://localhost:8080/api/v1/plants', {
                    headers: auth.authHeaders()
                });
                const json = await response.json();
                const plants = json.data || [];
                const list = document.getElementById('sidebar-plants-list');
                list.innerHTML = '';
                if (plants.length === 0) {
                    const li = document.createElement('li');
                    li.style.color = 'var(--text-dim)';
                    li.style.fontSize = '0.98rem';
                    li.innerText = 'No plants found';
                    list.appendChild(li);
                } else {
                    plants.forEach(plant => {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = `plant-detail.html?id=${plant.id}`;
                        a.innerText = plant.plantName || 'Unnamed Plant';
                        a.style.textDecoration = 'none';
                        a.style.color = 'var(--text-main)';
                        a.style.fontWeight = '600';
                        a.style.padding = '4px 0';
                        if (plant.id == plantId) {
                            a.style.color = 'var(--primary)';
                        }
                        li.appendChild(a);
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                // Optionally handle error
            }
        }
        fetchSidebarPlants();
    </script>
</body>
</html>
