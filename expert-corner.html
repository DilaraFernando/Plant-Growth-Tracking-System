<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Corner | PlantPulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --primary: #059669;
            --primary-light: #ecfdf5;
            --primary-glow: rgba(5, 150, 105, 0.15);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        aside {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1.5px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 3rem;
            text-decoration: none;
        }

        nav { flex: 1; }
        nav ul { list-style: none; }
        nav li { margin-bottom: 0.5rem; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary-light); color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary-glow); }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-top: 8px;
        }

        .chat-container {
            background: var(--card-bg);
            border-radius: 32px;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 500px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message.ai {
            align-self: flex-start;
            background: white;
            border: 1px solid var(--glass-border);
            border-radius: 18px 18px 18px 4px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .ai-icon {
            width: 28px;
            height: 28px;
            min-width: 28px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .typing-indicator {
            display: none;
            padding: 14px 18px;
            align-self: flex-start;
        }

        .typing-indicator.show {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 1px solid var(--glass-border);
            border-radius: 18px 18px 18px 4px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            padding: 16px 24px 24px;
            background: white;
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #047857;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .error-message {
            align-self: center;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 20px;
            border-radius: 18px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            aside { width: 80px; padding: 2rem 1rem; }
            .nav-link span, .logo span { display: none; }
            main { padding: 20px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <aside>
        <a href="dashboard.html" class="logo">
            <i data-lucide="sprout"></i>
            <span>PlantPulse</span>
        </a>
        <nav>
            <ul>
                <li><a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a></li>
                <li><a href="register-plant.html" class="nav-link"><i data-lucide="plus-square"></i> <span>Register Plant</span></a></li>
                <li><a href="all-plants.html" class="nav-link"><i data-lucide="leaf"></i> <span>All Plants</span></a></li>
                <li><a href="greenhouse.html" class="nav-link"><i data-lucide="container"></i> <span>My Collection</span></a></li>
                <li><a href="social-posts.html" class="nav-link"><i data-lucide="message-square"></i> <span>Social Feed</span></a></li>
                <li><a href="notifications.html" class="nav-link"><i data-lucide="bell"></i> <span>Notifications</span></a></li>
                <li><a href="weather.html" class="nav-link"><i data-lucide="cloud-sun"></i> <span>Weather</span></a></li>
                <li><a href="settings.html" class="nav-link"><i data-lucide="settings"></i> <span>Settings</span></a></li>
                <li><a href="expert-corner.html" class="nav-link active"><i data-lucide="bot"></i> <span>Expert Corner</span></a></li>
            </ul>
        </nav>
        <a href="javascript:void(0)" onclick="auth.logout()" style="color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; font-weight: 600; margin-top: auto; padding: 1rem;"><i data-lucide="log-out"></i> <span>Logout</span></a>
    </aside>

    <main>
        <div class="page-header">
            <h1>Expert Corner</h1>
            <p>Chat with our AI plant expert</p>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="typing-indicator" id="typing-indicator">
                <div class="ai-icon"><i data-lucide="bot" style="width:16px;height:16px;"></i></div>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" class="chat-input" id="user-input" placeholder="Ask about your plants..." />
                    <button class="send-btn" id="send-btn">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="API/auth.js"></script>
    <script>
        const CONFIG = { API_BASE_URL: 'http://localhost:8080' };

        lucide.createIcons();

        if (!auth.isLoggedIn()) {
            window.location.href = "sing-in/pages/sign-in.html";
        }

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        const welcomeMessage = "Hello! I am your plant expert assistant. Ask me anything about plant care, growth stages, fertilizers, or soil advice.";
        appendMessage(welcomeMessage, 'ai');

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if (type === 'ai') {
                msgDiv.innerHTML = `<div class="ai-icon"><i data-lucide="bot" style="width:16px;height:16px;"></i></div><div>${text}</div>`;
            } else {
                msgDiv.textContent = text;
            }
            chatMessages.appendChild(msgDiv);
            lucide.createIcons();
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            typingIndicator.classList.add('show');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.classList.remove('show');
        }

        function showError(text) {
            const errDiv = document.createElement('div');
            errDiv.className = 'message error-message';
            errDiv.textContent = text;
            chatMessages.appendChild(errDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            sendBtn.disabled = true;
            appendMessage(text, 'user');
            showTyping();

            try {
                const response = await fetch(CONFIG.API_BASE_URL + '/api/v1/chat/ask', {
                    method: 'POST',
                    headers: auth.authHeaders(),
                    body: JSON.stringify({ message: text })
                });

                hideTyping();
                sendBtn.disabled = false;

                if (!response.ok) {
                    showError('Sorry, something went wrong. Try again.');
                    return;
                }

                const json = await response.json();
                appendMessage(json.data.reply, 'ai');
            } catch (err) {
                hideTyping();
                sendBtn.disabled = false;
                showError('Sorry, something went wrong. Try again.');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
