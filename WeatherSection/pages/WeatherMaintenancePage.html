<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/WeatherMaintenancePage.css">
</head>
<body>
<div class="sidebar-bottom-action">
    <a href="../pages/WeatherSectionOverView.html" class="mini-weather-btn">
        <i class="fa-solid fa-cloud-sun"></i>
        <span>Weather Overview</span>
    </a>
</div>
</nav>
<main class="main-content">
    <div class="dashboard-container">
        <h2 style="margin-bottom: 30px; font-size: 24px; font-weight: 800;">Maintenance Insights</h2>

        <div class="cards-row">
            <div class="inner-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3 style="font-size:16px; margin:0;">Daily Tasks</h3>
                    <i class="fa-solid fa-ellipsis-vertical" style="color:#cbd5e1;"></i>
                </div>
                <div class="action-list">
                    <div class="action-item">
                        <div class="info-card active-card">
                            <div class="icon-box"><i class="fa-solid fa-droplet"></i></div>
                            <div class="text-content"><span>Watering</span><b style="font-size:13px;">500ml Needed Now</b></div>
                        </div>
                        <div class="status-marker status-done"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="action-item">
                        <div class="info-card active-card">
                            <div class="icon-box"><i class="fa-solid fa-flask"></i></div>
                            <div class="text-content"><span>Fertilizer</span><b style="font-size:13px;">Next Dose: In 3 Days</b></div>
                        </div>
                        <div class="status-marker status-done"><i class="fa-solid fa-check"></i></div>
                    </div>
                </div>
            </div>
            <div class="inner-card" style="text-align:center;">
                <span style="font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:1px;">Optimal Care Window</span>
                <div class="highlight-box">
                    <span class="time-display">04:00 <small style="font-size:16px;">PM</small></span>
                    <div style="font-size:11px; color:var(--primary); margin-top:5px; font-weight:700;">BEST TIME FOR SUNLIGHT</div>
                </div>
                <div class="reminder-row">
                    <div style="text-align:left;">
                        <b style="font-size:14px;">Reminders</b><br>
                        <span style="font-size:12px; color:#94a3b8;">Notify via Mobile</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
