<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In - Growth-Agri</title>
    <link rel="stylesheet" href="../css/sign-in.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="card">

    <div class="logo-row">
        <div class="logo">🌱</div>
        <div class="brand-name">Growth-Agri</div>
    </div>

    <h1>Sign In</h1>
    <p class="subtitle">
        Welcome back! Please enter your details to continue.
    </p>

    <div class="form-group">
        <label for="email">Email</label>
        <input
                type="email"
                id="email"
                placeholder="ferdz43@gmail.com"
                value="ferdz43@gmail.com"
                autocomplete="email"
        >
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input
                type="password"
                id="password"
                placeholder="••••••••"
                autocomplete="current-password"
        >
    </div>

    <div class="forgot-link">
        <a href="#">Forgot password?</a>
    </div>

    <button class="btn-signin">Sign In</button>

    <div class="divider">or continue with</div>

    <div class="social-row">
        <div class="social-circle"><i class="fab fa-google"></i></div>
        <div class="social-circle"><i class="fab fa-apple"></i></div>
        <div class="social-circle"><i class="fab fa-microsoft"></i></div>
    </div>

    <div class="footer">
        Don't have an account? <a href="../../RegisterPlant/pages/sign-up.html">Sign up</a>
    </div>

</div>

</body>
</html>
