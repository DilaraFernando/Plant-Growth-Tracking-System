<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up - Growth-Agri</title>
    <link rel="stylesheet" href="../css/sign-in.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="card">
    <div class="logo-row">
        <div class="logo">🌱</div>
        <div class="brand-name">Growth-Agri</div>
    </div>
    <h1>Sign Up</h1>
    <p class="subtitle">Create your account to get started.</p>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required />
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password" required />
    </div>
    <button class="btn-signup" id="registerBtn">Sign Up</button>
    <div id="registerError" style="color:red;margin-top:10px;"></div>
    <div class="footer">
        Already have an account? <a href="sign-in.html">Sign in</a>
    </div>
</div>
<script src="../js/register.js"></script>
</body>
</html>
