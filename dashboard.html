<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Growth Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.css">
    <!-- Lucide JS for icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #059669;
            --primary-light: #ecfdf5;
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            background: linear-gradient(135deg, #f8fafc 60%, #e0f7fa 100%);
        }
                .sidebar {
                    width: 260px;
                    background: linear-gradient(160deg, #e0f7fa 0%, #fff 100%);
                    border-right: 1.5px solid var(--glass-border);
                    box-shadow: 0 2px 16px 0 rgba(0,0,0,0.03);
                    position: sticky;
                    top: 0;
                    height: 100vh;
                    display: flex;
                    flex-direction: column;
                    z-index: 10;
                }
                .sidebar .logo {
                    font-weight: 800;
                    font-size: 1.7rem;
                    color: var(--primary);
                    display: flex;
                    align-items: center;
                    gap: 14px;
                    padding: 36px 32px 28px 32px;
                    text-decoration: none;
                    letter-spacing: -1px;
                    background: linear-gradient(90deg, #ecfdf5 60%, #fff 100%);
                    border-bottom: 1.5px solid var(--glass-border);
                    box-shadow: 0 2px 8px 0 rgba(5,150,105,0.03);
                }
                .sidebar-nav {
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                    padding: 18px 10px 0 10px;
                }
                .sidebar-link {
                    display: flex;
                    align-items: center;
                    gap: 14px;
                    padding: 13px 20px 13px 22px;
                    border-radius: 14px;
                    color: var(--text-dim);
                    font-size: 1.08rem;
                    font-weight: 500;
                    text-decoration: none;
                    transition: background 0.15s, color 0.15s, border-left 0.18s;
                    border-left: 4px solid transparent;
                }
                .sidebar-link.active {
                    background: var(--primary-light);
                    color: var(--primary);
                    border-left: 4px solid var(--primary);
                }
                .sidebar-link:hover {
                    background: #f1f5f9;
                    color: var(--primary);
                    border-left: 4px solid var(--primary-light);
                }
                .sidebar-link .lucide {
                    width: 22px;
                    height: 22px;
                }
                .sidebar-footer {
                    padding: 24px 32px;
                    border-top: 1px solid var(--glass-border);
                }
                .logout-btn {
                    width: 100%;
                    background: none;
                    border: 1.5px solid var(--primary);
                    color: var(--primary);
                    padding: 10px 0;
                    border-radius: 16px;
                    font-size: 1rem;
                    font-weight: 600;
                    cursor: pointer;
                    transition: background 0.15s, color 0.15s;
                }
                .logout-btn:hover {
                    background: var(--primary);
                    color: #fff;
                }
        .main-content {
            flex: 1;
            padding: 40px 0 0 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 8px 32px 0 rgba(5,150,105,0.06);
            border-radius: 0;
            margin: 0;
        }
        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px 32px 40px;
        }
        .dashboard-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .stats-row {
            display: flex;
            gap: 28px;
            margin-bottom: 36px;
            padding: 0 40px;
        }
        .stat-card {
            flex: 1 1 0;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1.5px solid var(--glass-border);
            padding: 32px 28px 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            backdrop-filter: blur(6px);
            transition: box-shadow 0.18s, transform 0.18s;
            margin-bottom: 0;
        }
                .stat-card:hover {
                    box-shadow: 0 8px 32px 0 rgba(5,150,105,0.08);
                    transform: translateY(-2px) scale(1.01);
                }
                .stat-label {
                    color: var(--text-dim);
                    font-size: 1.08rem;
                    font-weight: 500;
                }
                .stat-value {
                    font-size: 2.1rem;
                    font-weight: 700;
                    color: var(--primary);
                }
        .plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            padding: 0 40px 40px 40px;
        }
        .plant-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1.5px solid var(--glass-border);
            padding: 28px 24px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            backdrop-filter: blur(6px);
            transition: box-shadow 0.18s, transform 0.18s;
            margin-bottom: 0;
        }
                .plant-card:hover {
                    box-shadow: 0 8px 32px 0 rgba(5,150,105,0.08);
                    transform: translateY(-2px) scale(1.01);
                }
                .plant-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: flex-start;
                    margin-bottom: 8px;
                }
                .plant-info h3 {
                    font-size: 1.18rem;
                    font-weight: 700;
                    margin-bottom: 2px;
                }
                .plant-type {
                    font-size: 0.98rem;
                    color: var(--text-dim);
                }
                .status-badge {
                    font-size: 0.92rem;
                    font-weight: 600;
                    padding: 4px 14px;
                    border-radius: 12px;
                    text-transform: uppercase;
                    background: var(--primary-light);
                    color: var(--primary);
                    border: none;
                }
                .status-badge.completed {
                    background: #fef3c7;
                    color: #b45309;
                }
                .status-badge.active {
                    background: #d1fae5;
                    color: #065f46;
                }
                .status-badge.planting_success {
                    background: #d1fae5;
                    color: #065f46;
                }
                .status-badge.daily_update {
                    background: #dbeafe;
                    color: #1e40af;
                }
                .growth-stats {
                    margin-bottom: 10px;
                }
                .day-info {
                    display: flex;
                    justify-content: space-between;
                    font-size: 1rem;
                    margin-bottom: 8px;
                }
                .stage-name {
                    font-weight: 600;
                    color: var(--primary);
                }
                .progress-container {
                    height: 8px;
                    background: #e5e7eb;
                    border-radius: 4px;
                    overflow: hidden;
                }
                .progress-bar {
                    height: 100%;
                    background: var(--primary);
                    transition: width 0.5s ease;
                }
        .view-details-btn {
            display: block;
            text-align: center;
            padding: 10px;
            background: var(--primary-light);
            color: var(--primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid var(--primary);
            transition: background 0.18s, border-color 0.18s, color 0.18s;
            margin-top: 8px;
        }
        .view-details-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
                .loading, .error, .empty-state {
                    text-align: center;
                    padding: 60px 20px;
                }
                .error { color: #dc2626; }
                .empty-state h3 { margin-bottom: 10px; }
                .empty-state p { color: var(--text-dim); margin-bottom: 20px; }
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content {
                padding: 24px 0 0 0;
                margin: 0;
                border-radius: 0;
            }
            .plants-grid, .stats-row { padding: 0 12px; }
        }
            </style>
</head>
<body>
    <div class="dashboard-layout" style="display:flex;width:100vw;min-height:100vh;">
        <aside class="sidebar">
            <a href="dashboard.html" class="logo">
                <i class="lucide lucide-leaf"></i>
                Growth-Agri
            </a>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link active" id="sidebar-dashboard"><i class="lucide lucide-layout-dashboard"></i> Dashboard</a>
                <a href="register-plant.html" class="sidebar-link" id="sidebar-register"><i class="lucide lucide-plus-square"></i> Register Plant</a>
                <a href="social-posts.html" class="sidebar-link" id="sidebar-social"><i class="lucide lucide-message-square"></i> Social Posts</a>
                <a href="notifications.html" class="sidebar-link" id="sidebar-notifications"><i class="lucide lucide-bell"></i> Notifications</a>
                <a href="weather.html" class="sidebar-link" id="sidebar-weather"><i class="lucide lucide-cloud-sun"></i> Weather</a>
                <a href="#" class="sidebar-link" id="sidebar-logout" onclick="auth.logout()"><i class="lucide lucide-log-out"></i> Logout</a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <div class="dashboard-title">Dashboard</div>
                <a href="register-plant.html" class="btn-primary" style="display:flex;align-items:center;gap:8px;padding:12px 22px;font-size:1.08rem;font-weight:600;background:var(--primary);color:#fff;border-radius:10px;text-decoration:none;box-shadow:0 2px 8px 0 rgba(5,150,105,0.08);transition:background 0.18s;">
                    <i class="lucide lucide-plus"></i> Register New Plant
                </a>
            </div>
            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Total Plants</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Plants</div>
                    <div class="stat-value" id="stat-active">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Completed Plants</div>
                    <div class="stat-value" id="stat-completed">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Notifications</div>
                    <div class="stat-value" id="stat-notifications">0</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:0 40px 24px 40px;">
                <h1 class="title" style="font-size:1.5rem;font-weight:700;">Your Plants</h1>
            </div>
            <div id="plants-container">
                <div class="loading">Loading plants...</div>
            </div>

        </main>
    </div>

    <script src="API/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) {
            window.location.href = "sing-in/pages/sign-in.html";
        }

        async function fetchPlants() {
            const container = document.getElementById('plants-container');
            try {
                const res = await fetch('http://localhost:8080/api/v1/plants', {
                    headers: auth.authHeaders()
                });

                if (!res.ok) {
                    throw new Error('Failed to fetch plants');
                }

                const json = await res.json();
                const plants = json.data;
                renderPlants(plants);
            } catch (err) {
                container.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }

        function renderPlants(plants) {
            const container = document.getElementById('plants-container');
            if (!Array.isArray(plants) || plants.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="sprout" style="width:48px;height:48px;color:var(--gray);margin-bottom:16px;"></i>
                        <h3>No plants registered</h3>
                        <p>You have no plants yet. Register your first plant to begin.</p>
                        <a href="register-plant.html" class="btn-primary">Register Your First Plant</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = '<div class="plants-grid">';
            plants.forEach(plant => {
                const percent = Math.round((plant.currentDay / 30) * 100);
                const statusClass = plant.status === 'COMPLETED' ? 'completed' : 'active';
                html += `
                    <div class="plant-card">
                        <div class="plant-header">
                            <div class="plant-avatar">
                                <i data-lucide="leaf" style="width:32px;height:32px;color:var(--primary);"></i>
                            </div>
                            <div class="plant-info">
                                <h3>${plant.plantName}</h3>
                                <div class="plant-type">${plant.plantType}</div>
                            </div>
                            <span class="status-badge ${statusClass}">
                                <i data-lucide="check-circle" style="width:18px;height:18px;vertical-align:middle;${statusClass === 'completed' ? 'color:var(--success);' : 'color:var(--primary);'}"></i>
                                ${plant.status}
                            </span>
                        </div>
                        <div class="growth-stats">
                            <div class="day-info">
                                <span>Day ${plant.currentDay} of 30</span>
                                <span class="stage-name">${plant.currentStage || 'N/A'}</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${percent}%"></div>
                            </div>
                        </div>
                        <a href="plant-detail.html?id=${plant.id}" class="view-details-btn">
                            <i data-lucide="arrow-right-circle" style="width:18px;height:18px;vertical-align:middle;"></i>
                            View Progress
                        </a>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            auth.hideAuthLinks();
            fetchPlants();
        });
    </script>
</body>
</html>
