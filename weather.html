<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Growth Agri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #059669;
            --primary-light: #ecfdf5;
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-main);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            background: linear-gradient(135deg, #f8fafc 60%, #e0f7fa 100%);
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(160deg, #e0f7fa 0%, #fff 100%);
            border-right: 1.5px solid var(--glass-border);
            box-shadow: 0 2px 16px 0 rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar .logo {
            font-weight: 800;
            font-size: 1.7rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 36px 32px 28px 32px;
            text-decoration: none;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #ecfdf5 60%, #fff 100%);
            border-bottom: 1.5px solid var(--glass-border);
            box-shadow: 0 2px 8px 0 rgba(5,150,105,0.03);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 18px 10px 0 10px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 20px 13px 22px;
            border-radius: 14px;
            color: var(--text-dim);
            font-size: 1.08rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s, color 0.15s, border-left 0.18s;
            border-left: 4px solid transparent;
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .sidebar-link:hover {
            background: #f1f5f9;
            color: var(--primary);
            border-left: 4px solid var(--primary-light);
        }

        .sidebar-link .lucide {
            width: 22px;
            height: 22px;
        }

        .sidebar-footer {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
        }

        .main-content {
            flex: 1;
            padding: 40px 0 0 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 8px 32px 0 rgba(5,150,105,0.06);
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px 40px 40px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            margin-bottom: 32px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 0; }
        
        label { 
            font-weight: 700; 
            margin-bottom: 10px; 
            display: block; 
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            border: 1.5px solid var(--glass-border); 
            font-size: 1rem; 
            transition: all 0.2s;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .btn-row {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        button { 
            flex: 1;
            background: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 14px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { 
            background: #047857; 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(5, 150, 105, 0.3);
        }

        button:disabled {
            background: var(--text-dim);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .weather-cards-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 32px;
        }

        .weather-card {
            background: #fff;
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: all 0.2s;
        }

        .weather-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        .weather-card-label {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .weather-card-value {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .alert-result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.6;
            border: 2px solid transparent;
            box-shadow: var(--card-shadow);
        }

        .alert-green { background: #ecfdf5; color: #065f46; border-color: #10b981; }
        .alert-yellow { background: #fffbeb; color: #92400e; border-color: #f59e0b; }
        .alert-red { background: #fef2f2; color: #991b1b; border-color: #ef4444; }

        @media (max-width: 800px) {
            .weather-cards-row { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout" style="display:flex;width:100vw;min-height:100vh;">
        <aside class="sidebar">
            <a href="dashboard.html" class="logo">
                <i class="lucide lucide-leaf"></i>
                Growth Agri
            </a>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link" id="sidebar-dashboard"><i class="lucide lucide-layout-dashboard"></i> Dashboard</a>
                <a href="register-plant.html" class="sidebar-link" id="sidebar-register"><i class="lucide lucide-plus-square"></i> Register Plant</a>
                <a href="greenhouse.html" class="sidebar-link" id="sidebar-greenhouse"><i class="lucide lucide-container"></i> My Greenhouse</a>
                <a href="social-posts.html" class="sidebar-link" id="sidebar-social"><i class="lucide lucide-message-square"></i> Social Posts</a>
                <a href="notifications.html" class="sidebar-link" id="sidebar-notifications"><i class="lucide lucide-bell"></i> Notifications</a>
                <a href="weather.html" class="sidebar-link active" id="sidebar-weather"><i class="lucide lucide-cloud-sun"></i> Weather</a>
                <a href="experts.html" class="sidebar-link" id="sidebar-experts"><i class="lucide lucide-users"></i> Expert Advice</a>
                <a href="locator.html" class="sidebar-link" id="sidebar-locator"><i class="lucide lucide-map-pin"></i> Plant Locator</a>
                <a href="#" class="sidebar-link" id="sidebar-logout" onclick="auth.logout()" style="margin-top:auto;"><i class="lucide lucide-log-out"></i> Logout</a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>

        <main class="main-content">
            <div class="container">
                <div class="header-section">
                    <h1>Weather & Alerts</h1>
                </div>

                <div class="form-card">
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="city">City Name</label>
                            <input type="text" id="city" placeholder="e.g. Colombo" value="Colombo">
                        </div>
                        <div class="form-group">
                            <label for="plant-dropdown">Select Plant</label>
                            <select id="plant-dropdown"></select>
                            <div id="no-plants-msg" style="color:#ef4444; font-size:0.85rem; font-weight:600; margin-top:8px; display:none;">No plants found. Register one first.</div>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button id="check-weather">
                            <i data-lucide="cloud-rain"></i> Check Weather
                        </button>
                        <button id="get-alert">
                            <i data-lucide="alert-triangle"></i> Get Plant Alert
                        </button>
                        <button id="get-maintenance">
                            <i data-lucide="wrench"></i> Maintenance Tips
                        </button>
                    </div>
                </div>

                <div id="weather-result" style="display:none;"></div>
                <div id="alert-result" class="alert-result" style="display:none;"></div>
            </div>
        </main>
    </div>

    <script src="API/auth.js"></script>
    <script>
        if (!auth.isLoggedIn()) {
            window.location.href = "sing-in/pages/sign-in.html";
        }

        async function fetchPlantsAndPopulateDropdown() {
            try {
                const res = await fetch("http://localhost:8080/api/v1/plants", { headers: auth.authHeaders() });
                const json = await res.json();
                const dropdown = document.getElementById('plant-dropdown');
                dropdown.innerHTML = '';
                const plants = (json && json.data) ? json.data : [];
                
                if (!plants.length) {
                    document.getElementById('no-plants-msg').style.display = 'block';
                    dropdown.style.display = 'none';
                    document.getElementById('get-alert').disabled = true;
                    document.getElementById('get-maintenance').disabled = true;
                } else {
                    document.getElementById('no-plants-msg').style.display = 'none';
                    dropdown.style.display = 'block';
                    document.getElementById('get-alert').disabled = false;
                    document.getElementById('get-maintenance').disabled = false;
                    
                    plants.forEach(plant => {
                        const option = document.createElement('option');
                        option.value = plant.id;
                        option.text = `${plant.plantName} (${plant.plantType})`;
                        option.dataset.plantType = plant.plantType;
                        option.dataset.currentDay = plant.currentDay;
                        dropdown.appendChild(option);
                    });
                }
            } catch (err) {
                console.error("Failed to fetch plants", err);
            }
        }

        document.getElementById('check-weather').onclick = async function() {
            const city = document.getElementById('city').value.trim();
            if (!city) return;
            
            try {
                const res = await fetch("http://localhost:8080/api/v1/weather/current?city=" + encodeURIComponent(city), {
                    headers: auth.authHeaders()
                });
                const json = await res.json();
                if (json && json.data) {
                    const data = json.data;
                    const container = document.getElementById('weather-result');
                    container.style.display = 'block';
                    container.innerHTML = `
                        <div class="weather-cards-row">
                            <div class="weather-card">
                                <div class="weather-card-label">Temperature</div>
                                <div class="weather-card-value">${data.temperature}°C</div>
                            </div>
                            <div class="weather-card">
                                <div class="weather-card-label">Humidity</div>
                                <div class="weather-card-value">${data.humidity}%</div>
                            </div>
                            <div class="weather-card">
                                <div class="weather-card-label">Wind Speed</div>
                                <div class="weather-card-value">${data.windSpeed} m/s</div>
                            </div>
                            <div class="weather-card">
                                <div class="weather-card-label">Condition</div>
                                <div class="weather-card-value" style="font-size:1.2rem;">${data.condition}</div>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Weather fetch failed", err);
            }
        };

        document.getElementById('get-alert').onclick = async function() {
            const city = document.getElementById('city').value.trim();
            const dropdown = document.getElementById('plant-dropdown');
            const selected = dropdown.options[dropdown.selectedIndex];
            if (!city || !selected) return;
            
            const plantType = selected.dataset.plantType;
            
            try {
                const res = await fetch(`http://localhost:8080/api/v1/weather/alert?city=${encodeURIComponent(city)}&plantType=${encodeURIComponent(plantType)}`, {
                    headers: auth.authHeaders()
                });
                const json = await res.json();
                if (json && json.data) {
                    const alertEl = document.getElementById('alert-result');
                    alertEl.style.display = 'block';
                    
                    let colorClass = 'alert-green';
                    const msg = json.data.toLowerCase();
                    if (msg.includes('hot') || msg.includes('wind') || msg.includes('protect')) {
                        colorClass = 'alert-red';
                    } else if (msg.includes('humidity') || msg.includes('water')) {
                        colorClass = 'alert-yellow';
                    }
                    
                    alertEl.className = 'alert-result ' + colorClass;
                    alertEl.innerText = json.data;
                }
            } catch (err) {
                console.error("Alert fetch failed", err);
            }
        };

        document.getElementById('get-maintenance').onclick = async function() {
            const dropdown = document.getElementById('plant-dropdown');
            const selected = dropdown.options[dropdown.selectedIndex];
            if (!selected) return;
            
            const plantType = selected.dataset.plantType;
            const currentDay = selected.dataset.currentDay;
            
            try {
                const res = await fetch(`http://localhost:8080/api/v1/weather/maintenance?plantType=${encodeURIComponent(plantType)}&currentDay=${currentDay}`, {
                    headers: auth.authHeaders()
                });
                const json = await res.json();
                if (json && json.data) {
                    const alertEl = document.getElementById('alert-result');
                    alertEl.style.display = 'block';
                    
                    let colorClass = 'alert-yellow';
                    if (json.data.toLowerCase().includes('suitable') || json.data.toLowerCase().includes('good')) {
                        colorClass = 'alert-green';
                    }
                    
                    alertEl.className = 'alert-result ' + colorClass;
                    alertEl.innerText = json.data;
                }
            } catch (err) {
                console.error("Maintenance fetch failed", err);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (auth.hideAuthLinks) auth.hideAuthLinks();
            fetchPlantsAndPopulateDropdown();
            lucide.createIcons();
        });
    </script>
</body>
</html>
